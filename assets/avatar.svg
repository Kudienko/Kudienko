<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" font-family="'Trebuchet MS','Segoe UI',sans-serif">
  <defs>
    <!-- Радиальный тёмный фон -->
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#161028"/>
      <stop offset="55%" stop-color="#0c0a18"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>
    <!-- Неоновый градиент кольца -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#b026ff"/>
      <stop offset="100%" stop-color="#ff2e6e"/>
    </linearGradient>
    <!-- Свечение -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Фон-квадрат (GitHub обрежет в круг) -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Восходящее солнце (хиномару) за иероглифом -->
  <circle cx="250" cy="225" r="120" fill="#ff2e6e" opacity="0.16" filter="url(#soft)"/>

  <!-- Тонкие неоновые лучи -->
  <g stroke="#00e5ff" stroke-width="1.5" opacity="0.12">
    <line x1="250" y1="225" x2="250" y2="40"/>
    <line x1="250" y1="225" x2="430" y2="110"/>
    <line x1="250" y1="225" x2="450" y2="300"/>
    <line x1="250" y1="225" x2="70" y2="110"/>
    <line x1="250" y1="225" x2="50" y2="300"/>
  </g>

  <!-- Внешнее неоновое кольцо -->
  <circle cx="250" cy="250" r="205" fill="none" stroke="url(#ring)" stroke-width="6" filter="url(#glow)" opacity="0.9"/>
  <!-- Внутреннее тонкое кольцо -->
  <circle cx="250" cy="250" r="185" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.45"/>

  <!-- Кандзи 侍 (самурай) с неоновым свечением -->
  <text x="250" y="290" text-anchor="middle" font-size="220" fill="url(#ring)" filter="url(#glow)">侍</text>

  <!-- Вертикальная катакана сбоку -->
  <text x="392" y="170" text-anchor="middle" font-size="26" fill="#00e5ff" opacity="0.8"
        writing-mode="tb" letter-spacing="3" filter="url(#soft)">クディエンコ</text>

  <!-- Монограмма / имя снизу -->
  <text x="250" y="445" text-anchor="middle" font-size="34" font-weight="bold" letter-spacing="8"
        fill="#ffffff" opacity="0.92" filter="url(#soft)">I · K</text>
</svg>
