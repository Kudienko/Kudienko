# Генерация snake-анимации из сетки контрибуций.
# Результат пушится в ветку `output`, откуда README его подтягивает.
name: Generate Snake

on:
  # Запуск по расписанию — каждые 12 часов
  schedule:
    - cron: "0 */12 * * *"
  # Запуск при пуше в main
  push:
    branches:
      - main
  # Ручной запуск из вкладки Actions
  workflow_dispatch:

# Нужны права на запись, чтобы запушить svg в ветку output
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Генерируем тёмный и светлый варианты snake-svg
      - name: Generate snake SVG
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FF2E6E&color_dots=#0a0a16,#3b2a55,#7a3fa0,#b026ff,#00e5ff
            dist/github-snake.svg?palette=github-light&color_snake=#FF2E6E

      # Публикуем результат в ветку output
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
