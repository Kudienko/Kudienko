<svg width="100%" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">
  <!-- ===== Определения: градиенты, фильтры свечения ===== -->
  <defs>
    <!-- Фоновый вертикальный градиент (ночь над городом) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05050c"/>
      <stop offset="55%" stop-color="#0a0a16"/>
      <stop offset="100%" stop-color="#12081c"/>
    </linearGradient>

    <!-- Бегущий неоновый градиент для заливки имени -->
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#ff2e6e"/>
      <stop offset="1" stop-color="#b026ff"/>
      <!-- Анимация: сдвигаем градиент туда-обратно -->
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-300 0; 300 0; -300 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Свечение тории / самурайский красный -->
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5e7a"/>
      <stop offset="60%" stop-color="#ff2e6e"/>
      <stop offset="100%" stop-color="#7a0f2a"/>
    </radialGradient>

    <!-- Мягкое неоновое свечение -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b">
        <animate attributeName="stdDeviation" values="3;6;3" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- ===== Фон ===== -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Восходящее солнце (хиномару) с пульсацией -->
  <circle cx="450" cy="150" r="95" fill="url(#sun)" opacity="0.30" filter="url(#softglow)">
    <animate attributeName="r" values="90;100;90" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.22;0.38;0.22" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== Горизонтальные scanlines ===== -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.05">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
  </g>
  <!-- Бегущая яркая scanline -->
  <line x1="0" x2="900" y1="0" y2="0" stroke="#00e5ff" stroke-width="2" opacity="0.25">
    <animate attributeName="y1" values="0;280;0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;280;0" dur="7s" repeatCount="indefinite"/>
  </line>

  <!-- ===== Тории-гейт (⛩) слева, неоновый контур (у самого края) ===== -->
  <g stroke="#ff2e6e" stroke-width="4" fill="none" filter="url(#glow)" stroke-linecap="round">
    <!-- верхняя дугообразная балка (касаги) -->
    <path d="M18 70 Q73 56 128 70"/>
    <!-- вторая балка -->
    <line x1="26" y1="92" x2="120" y2="92"/>
    <!-- столбы -->
    <line x1="40" y1="70" x2="40" y2="210"/>
    <line x1="106" y1="70" x2="106" y2="210"/>
  </g>

  <!-- ===== Тории-гейт справа (зеркально), cyan (у самого края) ===== -->
  <g stroke="#00e5ff" stroke-width="4" fill="none" filter="url(#glow)" stroke-linecap="round">
    <path d="M772 70 Q827 56 882 70"/>
    <line x1="780" y1="92" x2="874" y2="92"/>
    <line x1="794" y1="70" x2="794" y2="210"/>
    <line x1="860" y1="70" x2="860" y2="210"/>
  </g>

  <!-- ===== Вертикальная японская надпись (катакана: КУДИЭНКО) ===== -->
  <text x="250" y="70" fill="#ff2e6e" font-size="22" letter-spacing="2" opacity="0.85"
        writing-mode="tb" filter="url(#softglow)">クディエンコ</text>
  <text x="650" y="70" fill="#00e5ff" font-size="22" letter-spacing="2" opacity="0.85"
        writing-mode="tb" filter="url(#softglow)">フルスタック</text>

  <!-- ===== Главный титул ===== -->
  <text x="450" y="138" text-anchor="middle" font-size="62" font-weight="bold"
        fill="url(#neon)" filter="url(#glow)" letter-spacing="3">ILYA KUDIENKO</text>

  <!-- Подзаголовок -->
  <text x="450" y="178" text-anchor="middle" font-size="19" fill="#c9d1ff"
        letter-spacing="4" opacity="0.9">F U L L - S T A C K&#160;&#160;D E V E L O P E R</text>

  <!-- Кандзи "侍" (самурай) под подзаголовком, мерцает -->
  <text x="450" y="226" text-anchor="middle" font-size="30" fill="#ff8fb1"
        filter="url(#glow)" opacity="0.9">侍</text>

  <!-- ===== Опадающие лепестки сакуры ===== -->
  <g fill="#ff8fb1">
    <ellipse cx="0" cy="0" rx="5" ry="3" opacity="0.9">
      <animateMotion path="M120 -10 Q150 90 110 270" dur="8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="4" ry="2.5" fill="#ff5e7a" opacity="0.85">
      <animateMotion path="M340 -10 Q300 120 360 280" dur="10s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="4s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="5" ry="3" opacity="0.8">
      <animateMotion path="M560 -10 Q610 110 540 280" dur="9s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3.5s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="4" ry="2.5" fill="#ffb3c8" opacity="0.85">
      <animateMotion path="M760 -10 Q720 130 800 280" dur="11s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="5s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="4" ry="2.5" opacity="0.75">
      <animateMotion path="M470 -10 Q440 120 500 280" dur="9.5s" begin="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
  </g>

  <!-- ===== Нижняя неоновая линия ===== -->
  <rect x="0" y="276" width="900" height="4" fill="url(#neon)" opacity="0.8"/>
</svg>
